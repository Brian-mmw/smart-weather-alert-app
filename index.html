<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Country Info App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow mx-auto" style="max-width: 500px;">
    <h3 class="text-center mb-3">Country Info</h3>

    <input id="country-input" class="form-control mb-3" placeholder="Enter country">

    <button id="search-btn" class="btn btn-primary w-100 mb-3">
      Search
    </button>

    <div id="result"></div>
    <div id="error" class="alert alert-danger d-none"></div>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
